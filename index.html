<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Audio Lab PRO - Diagnóstico</title>

    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #eee;
            font-family: Arial;
            text-align: center;
        }

        canvas {
            width: 95vw;
            height: 250px;
            margin: 10px auto;
            display: block;
            border: 1px solid #333;
            background: #000;
        }

        #rta {
            height: 200px;
        }

        #scope {
            height: 150px;
        }

        .controls {
            margin: 10px;
        }

        button,
        select,
        input {
            padding: 6px;
            margin: 4px;
        }

        .info {
            color: #00ffaa;
            margin-top: 5px;
            font-weight: bold;
        }

        .warn {
            color: #ff4444;
        }

        .ok {
            color: #00ffaa;
        }
    </style>
</head>

<body>

    <h2>Audio Lab PRO - Diagnóstico</h2>

    <div class="controls">

        <button id="micBtn">Mic</button>

        <input type="file" id="fileInput">

        <select id="fftSel">
            <option value="2048">FFT 2048</option>
            <option value="4096" selected>FFT 4096</option>
            <option value="8192">FFT 8192</option>
        </select>

        <select id="rangeSel">
            <option value="4000" selected>4 kHz</option>
            <option value="8000">8 kHz</option>
            <option value="16000">16 kHz</option>
            <option value="22050">Full</option>
        </select>

        <select id="smoothSel">
            <option value="0.5">Suavizado Bajo</option>
            <option value="0.75" selected>Medio</option>
            <option value="0.9">Alto</option>
        </select>

        <button id="pauseBtn">Pausa</button>

    </div>

    <canvas id="spec"></canvas>
    <canvas id="rta"></canvas>
    <canvas id="scope"></canvas>

    <div class="info" id="info"></div>

    <script>

        //========================================
        // CANVAS
        //========================================

        function fixCanvas() {

            ["spec", "rta", "scope"].forEach(id => {

                const c = document.getElementById(id);

                c.width = c.clientWidth;
                c.height = c.clientHeight;
            });
        }

        window.addEventListener("resize", fixCanvas);

        //========================================
        // AUDIO
        //========================================

        let audioCtx, analyser;

        let freqData, timeData;

        let fftSize = 4096;
        let maxFreq = 4000;
        let smoothing = 0.75;

        const bands = 100;

        let bandSmooth = new Array(bands).fill(-100);

        let running = false;

        //========================================
        // WARNING HOLD
        //========================================

        let activeWarnings = {};

        const HOLD_TIME = 1500;

        //========================================
        // INIT
        //========================================

        function init() {

            if (!audioCtx) {

                audioCtx = new (
                    window.AudioContext ||
                    window.webkitAudioContext
                )();
            }

            if (audioCtx.state === "suspended") {
                audioCtx.resume();
            }
        }

        function setup(src) {

            analyser = audioCtx.createAnalyser();

            analyser.fftSize = fftSize;

            freqData = new Float32Array(
                analyser.frequencyBinCount
            );

            timeData = new Uint8Array(
                analyser.fftSize
            );

            src.connect(analyser);

            running = true;

            draw();
        }

        //========================================
        // INPUTS
        //========================================

        micBtn.onclick = async () => {

            init();

            const stream =
                await navigator.mediaDevices.getUserMedia({
                    audio: true
                });

            setup(
                audioCtx.createMediaStreamSource(stream)
            );
        };

        fileInput.onchange = e => {

            const f = e.target.files[0];

            if (!f) return;

            init();

            const r = new FileReader();

            r.onload = ev => {

                audioCtx.decodeAudioData(
                    ev.target.result,
                    b => {

                        const src =
                            audioCtx.createBufferSource();

                        src.buffer = b;

                        setup(src);

                        analyser.connect(audioCtx.destination);

                        src.start();
                    }
                );
            };

            r.readAsArrayBuffer(f);
        };

        //========================================
        // UTILS
        //========================================

        function freqToY(freq, h) {

            const min = 20;

            return h - (
                (Math.log10(freq) - Math.log10(min))
                /
                (Math.log10(maxFreq) - Math.log10(min))
            ) * h;
        }

        function getColor(v) {

            return `hsl(${240 - v * 240},100%,${v * 50 + 25}%)`;
        }

        //========================================
        // DRAW LOOP
        //========================================

        function draw() {

            if (!running) return;

            requestAnimationFrame(draw);

            analyser.getFloatFrequencyData(freqData);

            analyser.getByteTimeDomainData(timeData);

            drawSpec();

            drawRTA();

            drawScope();

            analyze();
        }

        //========================================
        // SPECTROGRAM SCALE
        //========================================

        function drawFreqScale(ctx, w, h, leftPad) {

            const freqs = [
                20,
                50,
                100,
                200,
                500,
                1000,
                2000,
                5000,
                10000,
                16000
            ];

            ctx.strokeStyle = "#222";

            ctx.fillStyle = "#888";

            ctx.lineWidth = 1;

            ctx.font = "10px Arial";

            freqs.forEach(f => {

                if (f > maxFreq) return;

                const y = freqToY(f, h);

                // línea horizontal

                ctx.beginPath();

                ctx.moveTo(leftPad, y);

                ctx.lineTo(w, y);

                ctx.stroke();

                // texto

                let txt =
                    f >= 1000
                        ? (f / 1000) + "k"
                        : f;

                ctx.fillText(
                    txt + "Hz",
                    5,
                    y - 2
                );
            });
        }

        //========================================
        // SPECTROGRAM
        //========================================

        function drawSpec() {

            const c = spec;

            const ctx = c.getContext("2d");

            const w = c.width;

            const h = c.height;

            const leftPad = 60;

            // mover waterfall

            ctx.drawImage(
                c,
                leftPad,
                0,
                w - leftPad,
                h,

                leftPad - 1,
                0,
                w - leftPad,
                h
            );

            // nueva columna

            ctx.fillStyle = "#000";

            ctx.fillRect(
                w - 3,
                0,
                3,
                h
            );

            // dibujar bandas nuevas

            for (let b = 0; b < bands; b++) {

                const f1 =
                    20 * Math.pow(
                        maxFreq / 20,
                        b / bands
                    );

                const f2 =
                    20 * Math.pow(
                        maxFreq / 20,
                        (b + 1) / bands
                    );

                let peak = -999;

                for (let i = 1; i < freqData.length; i++) {

                    const f =
                        i *
                        (audioCtx.sampleRate / 2)
                        /
                        freqData.length;

                    if (f >= f1 && f < f2) {

                        peak = Math.max(
                            peak,
                            freqData[i]
                        );
                    }
                }

                if (peak < -998) continue;

                let db = peak;

                bandSmooth[b] =
                    smoothing * bandSmooth[b]
                    +
                    (1 - smoothing) * db;

                let norm =
                    (bandSmooth[b] + 80) / 50;

                norm = Math.max(
                    0,
                    Math.min(1, norm)
                );

                const y1 = freqToY(f1, h);

                const y2 = freqToY(f2, h);

                ctx.fillStyle = getColor(norm);

                ctx.fillRect(
                    w - 3,
                    y2,
                    3,
                    Math.max(2, y1 - y2)
                );
            }

            // limpiar zona izquierda

            ctx.fillStyle = "#000";

            ctx.fillRect(
                0,
                0,
                leftPad,
                h
            );

            // escalas

            drawFreqScale(
                ctx,
                w,
                h,
                leftPad
            );
        }

        //========================================
        // RTA SCALES
        //========================================

        function drawRTAScales(ctx, w, h) {

            const freqs = [
                20,
                50,
                100,
                200,
                500,
                1000,
                2000,
                5000,
                10000,
                16000
            ];

            ctx.strokeStyle = "#222";

            ctx.fillStyle = "#888";

            ctx.font = "10px Arial";

            // frecuencias

            freqs.forEach(f => {

                if (f > maxFreq) return;

                const x =
                    Math.log10(f / 20)
                    /
                    Math.log10(maxFreq / 20)
                    * w;

                ctx.beginPath();

                ctx.moveTo(x, 0);

                ctx.lineTo(x, h);

                ctx.stroke();

                let txt =
                    f >= 1000
                        ? (f / 1000) + "k"
                        : f;

                ctx.fillText(
                    txt,
                    x + 2,
                    h - 5
                );
            });

            // dB

            for (let db = -100; db <= 0; db += 20) {

                const y =
                    h -
                    ((db + 100) / 100) * h;

                ctx.beginPath();

                ctx.moveTo(0, y);

                ctx.lineTo(w, y);

                ctx.stroke();

                ctx.fillText(
                    db + " dB",
                    5,
                    y - 2
                );
            }
        }

        //========================================
        // RTA
        //========================================

        function drawRTA() {

            const c = rta;

            const ctx = c.getContext("2d");

            const w = c.width;

            const h = c.height;

            ctx.clearRect(0, 0, w, h);

            drawRTAScales(ctx, w, h);

            ctx.beginPath();

            for (let b = 0; b < bands; b++) {

                const f =
                    20 * Math.pow(
                        maxFreq / 20,
                        b / bands
                    );

                const x =
                    Math.log10(f / 20)
                    /
                    Math.log10(maxFreq / 20)
                    * w;

                const y =
                    h -
                    ((bandSmooth[b] + 100) / 100)
                    * h;

                if (b === 0) {
                    ctx.moveTo(x, y);
                }
                else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.strokeStyle = "#00ffaa";

            ctx.lineWidth = 2;

            ctx.stroke();
        }

        //========================================
        // OSCILLOSCOPE
        //========================================

        function drawScope() {

            const c = scope;

            const ctx = c.getContext("2d");

            const w = c.width;

            const h = c.height;

            ctx.clearRect(0, 0, w, h);

            ctx.beginPath();

            for (let i = 0; i < timeData.length; i++) {

                const x =
                    i / timeData.length * w;

                const y =
                    (timeData[i] / 255) * h;

                if (i === 0) {
                    ctx.moveTo(x, y);
                }
                else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.strokeStyle = "#ffaa00";

            ctx.stroke();
        }

        //========================================
        // ANALYZE
        //========================================

        function analyze() {

            let max = -999;

            let idx = 0;

            for (let i = 0; i < freqData.length; i++) {

                if (freqData[i] > max) {

                    max = freqData[i];

                    idx = i;
                }
            }

            const freq =
                idx *
                (audioCtx.sampleRate / 2)
                /
                freqData.length;

            let detected = [];

            // ruido AC

            if (
                freq > 45 &&
                freq < 65 &&
                max > -60
            ) {
                detected.push(
                    "⚠️ Ruido eléctrico"
                );
            }

            // armónicos

            let harmonics = 0;

            for (let h = 2; h <= 5; h++) {

                let i = Math.floor(idx * h);

                if (
                    i < freqData.length &&
                    freqData[i] > -70
                ) {
                    harmonics++;
                }
            }

            if (harmonics >= 2) {

                detected.push(
                    "⚠️ Armónicos"
                );
            }

            // clipping

            let peakCount = 0;

            for (let i = 0; i < timeData.length; i++) {

                if (
                    timeData[i] > 250 ||
                    timeData[i] < 5
                ) {
                    peakCount++;
                }
            }

            if (
                peakCount >
                timeData.length * 0.1
            ) {
                detected.push(
                    "⚠️ Clipping"
                );
            }

            // hold system

            const now = performance.now();

            detected.forEach(w => {

                activeWarnings[w] = now;
            });

            let visible = [];

            Object.keys(activeWarnings).forEach(w => {

                if (
                    now - activeWarnings[w]
                    < HOLD_TIME
                ) {
                    visible.push(w);
                }
            });

            // output

            let text =
                `Freq: ${freq.toFixed(1)} Hz | `
                +
                `Nivel: ${max.toFixed(1)} dB`;

            if (visible.length) {

                text +=
                    " | "
                    +
                    visible.join(" | ");

                info.className = "info warn";
            }
            else {

                text += " | ✔️ Señal OK";

                info.className = "info ok";
            }

            info.innerText = text;
        }

        //========================================
        // CONTROLS
        //========================================

        pauseBtn.onclick = () => {

            running = !running;

            if (running) {
                draw();
            }
        };

        fftSel.onchange = e => {

            fftSize = parseInt(e.target.value);
        };

        rangeSel.onchange = e => {

            maxFreq = parseInt(e.target.value);
        };

        smoothSel.onchange = e => {

            smoothing = parseFloat(e.target.value);
        };

        //========================================
        // START
        //========================================

        fixCanvas();

    </script>

</body>

</html>
